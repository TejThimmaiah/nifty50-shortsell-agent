name: nifty50-shortsell-agent — Trading Agent

on:
  schedule:
    - cron: "15 3 * * 1-5"   # 8:45 AM IST — morning prep + Kite login
    - cron: "40 9 * * 1-5"   # 3:10 PM IST — emergency square-off
    - cron: "05 10 * * 1-5"  # 3:35 PM IST — EOD report
    - cron: "30 1 * * 1"     # 7:00 AM IST Monday — weekly backtest
  workflow_dispatch:
    inputs:
      job:
        description: "Which job to run"
        required: true
        default: "morning_prep"
        type: choice
        options:
          - morning_prep
          - trading_session
          - squareoff
          - eod_report
          - healthcheck
          - backtest

# ─────────────────────────────────────────────────────────────────────────────
# SHARED ENV — used by ALL jobs
# ─────────────────────────────────────────────────────────────────────────────
env:
  GROQ_API_KEY:        ${{ secrets.GROQ_API_KEY }}
  TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
  KITE_API_KEY:        ${{ secrets.KITE_API_KEY }}
  KITE_API_SECRET:     ${{ secrets.KITE_API_SECRET }}
  KITE_USER_ID:        ${{ secrets.KITE_USER_ID }}
  KITE_PASSWORD:       ${{ secrets.KITE_PASSWORD }}
  KITE_TOTP_SECRET:    ${{ secrets.KITE_TOTP_SECRET }}
  KITE_ACCESS_TOKEN:   ${{ secrets.KITE_ACCESS_TOKEN }}
  PAPER_TRADE:         "false"
  GITHUB_REPO:         ${{ github.repository }}
  GITHUB_TOKEN:        ${{ secrets.GITHUB_TOKEN }}

jobs:

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 1 — MORNING PREP: Login to Kite, refresh token, health check
  # Runs at 8:45 AM IST every weekday
  # ───────────────────────────────────────────────────────────────────────────
  morning_prep:
    name: Morning Prep (8:45 AM IST)
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '15 3 * * 1-5') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'morning_prep')

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt -q
          pip install selenium webdriver-manager PyNaCl -q

      - name: Install Chrome
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq google-chrome-stable || \
          sudo apt-get install -y -qq chromium-browser || true

      - name: Refresh Kite access token
        run: python kite_login.py
        # kite_login.py writes token to /tmp/tej/token.env AND saves to GitHub Secrets

      - name: Verify token file
        id: token
        run: |
          if [ -f /tmp/tej/token.env ]; then
            TOKEN=$(grep "^KITE_ACCESS_TOKEN=" /tmp/tej/token.env | cut -d= -f2 | tr -d '[:space:]')
            if [ -n "$TOKEN" ]; then
              echo "found=true" >> $GITHUB_OUTPUT
              echo "✅ Token ready: ${TOKEN:0:10}..."
            else
              echo "found=false" >> $GITHUB_OUTPUT
              echo "⚠️ Token file empty"
            fi
          else
            echo "found=false" >> $GITHUB_OUTPUT
            echo "⚠️ No token file at /tmp/tej/token.env"
          fi

      - name: Upload token artifact
        uses: actions/upload-artifact@v4
        with:
          name: kite-token-${{ github.run_number }}
          path: /tmp/tej/token.env
          retention-days: 1

      - name: Health check
        run: python main.py --healthcheck
        continue-on-error: true

      - name: Notify Telegram
        run: |
          python -c "
          import requests, os
          t = os.environ.get('TELEGRAM_BOT_TOKEN','')
          c = os.environ.get('TELEGRAM_CHAT_ID','')
          found = '${{ steps.token.outputs.found }}'
          icon = '✅' if found == 'true' else '⚠️'
          msg = f'{icon} Morning prep complete. Tej starts trading at 9:20 AM IST.'
          if t and c:
              requests.post(f'https://api.telegram.org/bot{t}/sendMessage',
                  json={'chat_id': c, 'text': msg}, timeout=10)
          "

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 2 — TRADING SESSION: Full autonomous trading 9:20 AM – 3:08 PM IST
  # Starts automatically after morning_prep completes
  # ───────────────────────────────────────────────────────────────────────────
  trading_session:
    name: Trading Session (9:20 AM – 3:08 PM IST)
    runs-on: ubuntu-latest
    needs: morning_prep
    if: |
      always() && (
        (github.event_name == 'schedule' && github.event.schedule == '15 3 * * 1-5') ||
        (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'trading_session')
      )
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt -q

      - name: Download Kite token artifact
        uses: actions/download-artifact@v4
        with:
          name: kite-token-${{ github.run_number }}
          path: /tmp/tej
        continue-on-error: true

      - name: Load fresh Kite token into environment
        run: |
          if [ -f /tmp/tej/token.env ]; then
            # Read token from artifact (generated by kite_login.py this morning)
            TOKEN=$(grep "^KITE_ACCESS_TOKEN=" /tmp/tej/token.env | cut -d= -f2 | tr -d '[:space:]')
            if [ -n "$TOKEN" ]; then
              echo "KITE_ACCESS_TOKEN=$TOKEN" >> $GITHUB_ENV
              echo "✅ Fresh token loaded from artifact: ${TOKEN:0:10}..."
            else
              echo "⚠️ Token file empty — using secret fallback"
            fi
          else
            echo "⚠️ No artifact found — using KITE_ACCESS_TOKEN from GitHub Secrets"
          fi

      - name: Run Tej trading agent
        run: timeout 21600 python main.py || true
        env:
          KITE_ACCESS_TOKEN: ${{ env.KITE_ACCESS_TOKEN }}
          SQUARE_OFF_OVERRIDE: "15:08"

      - name: Upload logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trading-logs-${{ github.run_number }}
          path: |
            logs/
            db/
          retention-days: 30

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 3 — EMERGENCY SQUARE-OFF: Force close ALL positions at 3:10 PM IST
  # Runs as a separate scheduled workflow — independent of trading_session
  # ───────────────────────────────────────────────────────────────────────────
  squareoff:
    name: Emergency Square-Off (3:10 PM IST)
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '40 9 * * 1-5') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'squareoff')

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt -q
    - name: Download Kite token for squareoff
      uses: actions/download-artifact@v4
      with:
        name: kite-token-${{ github.run_number }}
        path: /tmp/tej
      continue-on-error: true
    - name: Load Kite token for squareoff
      run: |
        if [ -f /tmp/tej/token.env ]; then
          TOKEN=$(grep "^KITE_ACCESS_TOKEN=" /tmp/tej/token.env | cut -d= -f2 | tr -d '[:space:]')
          if [ -n "$TOKEN" ]; then
            echo "KITE_ACCESS_TOKEN=$TOKEN" >> $GITHUB_ENV
            echo "✅ Token loaded for squareoff: ${TOKEN:0:10}..."
          fi
        else
          echo "⚠️ No token artifact — using secret fallback"
        fi
      - name: Square off all positions
        run: |
          python -c "
          import os, sys
          sys.path.insert(0, '.')
          from agents.trade_executor import TradeExecutorAgent
          ex = TradeExecutorAgent()
          result = ex.square_off_all()
          print(f'Square-off result: {result}')
          "
        continue-on-error: true
      - name: Notify
        run: |
          python -c "
          import requests, os
          t = os.environ.get('TELEGRAM_BOT_TOKEN','')
          c = os.environ.get('TELEGRAM_CHAT_ID','')
          if t and c:
              requests.post(f'https://api.telegram.org/bot{t}/sendMessage',
                  json={'chat_id': c, 'text': '🛑 3:10 PM — Emergency square-off triggered. All MIS positions being closed.'}, timeout=10)
          "

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 4 — EOD REPORT: Tej sends honest daily summary at 3:35 PM IST
  # Runs independently on its own schedule — no dependency on squareoff job
  # (squareoff runs in a separate workflow instance at 3:10 PM)
  # ───────────────────────────────────────────────────────────────────────────
  eod_report:
    name: EOD Report (3:35 PM IST)
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '05 10 * * 1-5') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'eod_report')

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt -q
      - name: Generate and send EOD report
        run: |
          python -c "
          import os, sys, requests
          sys.path.insert(0, '.')
          os.makedirs('db', exist_ok=True)
          os.makedirs('logs', exist_ok=True)
          # Fetch P&L from live Zerodha account
          try:
              from agents.trade_executor import TradeExecutorAgent
              ex = TradeExecutorAgent()
              bal = ex.get_account_balance()
              positions = ex.get_positions()
              lines = ['📊 <b>EOD Report — Tej</b>\n']
              if bal:
                  lines.append(f'Day P&amp;L   : Rs {bal.get(\"total_pnl_today\", 0):+,.2f}')
                  lines.append(f'Cash balance : Rs {bal.get(\"available_cash\", 0):,.0f}')
              if positions:
                  lines.append(f'\n⚠️ Open positions ({len(positions)}):')
                  for sym, p in positions.items():
                      lines.append(f'  {sym}: qty={p[\"quantity\"]} | P&amp;L=Rs {p.get(\"pnl\",0):+,.2f}')
              else:
                  lines.append('\n✅ All positions squared off')
              lines.append('\n✅ Data from Zerodha Kite (live)')
              report = '\n'.join(lines)
          except Exception as e:
              report = f'EOD Report\nError: {e}\nCheck Zerodha app for P&amp;L.'
          t = os.environ.get('TELEGRAM_BOT_TOKEN','')
          c = os.environ.get('TELEGRAM_CHAT_ID','')
          if t and c:
              requests.post(f'https://api.telegram.org/bot{t}/sendMessage',
                  json={'chat_id': c, 'text': report[:4096], 'parse_mode': 'HTML'}, timeout=15)
          print(report)
          "

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 5 — HEALTH CHECK: Verify Tej is ready (run anytime manually)
  # ───────────────────────────────────────────────────────────────────────────
  healthcheck:
    name: Health Check
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'healthcheck'

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt -q
      - run: python main.py --healthcheck

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 6 — WEEKLY BACKTEST: Every Monday 7 AM IST
  # ───────────────────────────────────────────────────────────────────────────
  weekly_backtest:
    name: Weekly Backtest (Monday 7 AM IST)
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '30 1 * * 1') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'backtest')

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt -q
      - name: Run weekly backtest
        run: python main.py --backtest
        continue-on-error: true
